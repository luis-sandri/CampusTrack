<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusTrack - Cadastrar evento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <style>
    :root {
      --bs-primary: #1e40af;
      --bs-primary-rgb: 30, 64, 175;
    }
    body {
      background-color: #fff;
      color: #212529;
    }
  </style>
</head>
<body data-perfil="organizador">
  <nav class="navbar bg-body-tertiary border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary fs-4" href="../index.html">CT</a>
      <div class="btn-group dropstart">
        <button type="button" class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
          Menu
        </button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item link-primary" href="organizador_dashboard.html">Area do organizador</a></li>
          <li><a class="dropdown-item link-primary active" href="evento_adicionar.html" aria-current="page">Cadastrar evento</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h1 class="mb-4">Cadastrar evento</h1>
    <div class="card mb-5">
      <div class="card-header">
        <h5 class="card-title mb-0">Novo evento</h5>
      </div>
      <div class="card-body">
        <form id="form-evento" novalidate>
          <div class="row">
            <div class="col-12 mb-3">
              <label for="evento-nome" class="form-label">Nome <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="evento-nome" maxlength="50" required>
            </div>
          </div>
          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="evento-id_instituicao" class="form-label">Instituicao <span class="text-danger">*</span></label>
              <select id="evento-id_instituicao" class="form-control" required>
                <option value="">Carregando...</option>
              </select>
            </div>
            <div class="col-md-4 mb-3">
              <label for="evento-data" class="form-label">Data e horario <span class="text-danger">*</span></label>
              <input type="datetime-local" class="form-control" id="evento-data" required>
            </div>
            <div class="col-md-4 mb-3">
              <label for="evento-id_local" class="form-label">Local <span class="text-danger">*</span></label>
              <select id="evento-id_local" class="form-control" required disabled>
                <option value="">Selecione a data primeiro</option>
              </select>
            </div>
          </div>
          <div>
            <button id="enviar" type="submit" class="btn btn-primary">Salvar</button>
            <button type="button" class="btn btn-secondary" id="btn-cancelar" onclick="window.location.href='organizador_dashboard.html'">Cancelar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/valida_sessao.js"></script>
  <script src="../../js/evento_adicionar.js"></script>
</body>
</html>
