<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusTrack — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <style>
    :root {
      --bs-primary: #1e40af;
      --bs-primary-rgb: 30, 64, 175;
      --ct-gray-card: #f3f4f6;
      --ct-border: #d1d5db;
    }
    body {
      background-color: #fff;
      color: #212529;
    }
    .btn-primary:hover {
      background-color: #1d4ed8;
      border-color: #1d4ed8;
    }
  </style>
</head>
<body>
  <main class="container py-4 py-sm-5 min-vh-100 d-flex flex-column align-items-center justify-content-center" style="max-width: 30rem;">
    <header class="text-center w-100 mb-4">
      <img
        src="../../../assets/logo-campustrack.png"
        alt="CampusTrack"
        width="120"
        class="img-fluid mb-3"
      >
      <h1 class="h4 fw-bold text-primary">Login</h1>
      <p class="text-muted" id="msg-tipo"></p>
    </header>

    <!-- Alerta de Mensagem -->
    <div id="alerta-msg" class="alert d-none w-100" role="alert"></div>

    <!-- Formulário de Login (só para gerente) -->
    <form id="form-login" class="w-100 d-flex flex-column gap-3 d-none">
      <div class="form-group">
        <label for="email" class="form-label fw-medium">E-mail</label>
        <input type="email" id="email" name="email" class="form-control form-control-lg bg-light" placeholder="nome@email.com" required>
      </div>
      <div class="form-group">
        <label for="senha" class="form-label fw-medium">Senha</label>
        <input type="password" id="senha" name="senha" class="form-control form-control-lg bg-light" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-100 mt-2" id="btn-entrar">
        Entrar
      </button>
    </form>

    <!-- Placeholder -->
    <p id="placeholder-msg" class="text-center text-muted small mt-4 mb-0 d-none">Página de login (conteúdo a definir).</p>

    <p class="text-center mt-3">
      <a href="../index.html" class="link-primary">Voltar ao início</a>
    </p>
  </main>

  <script>
    var params = new URLSearchParams(window.location.search);
    var tipo = params.get('tipo');
    var el = document.getElementById('msg-tipo');
    var formLogin = document.getElementById('form-login');
    var placeholder = document.getElementById('placeholder-msg');

    if (tipo === 'gerente') {
      el.textContent = 'Acesso como gerente de blocos';
      formLogin.classList.remove('d-none');
    } else if (tipo === 'organizacao') {
      el.textContent = 'Acesso como organização';
      placeholder.classList.remove('d-none');
    } else {
      el.textContent = 'Escolha o tipo de acesso na página inicial.';
      placeholder.classList.remove('d-none');
    }
  </script>
  <script src="../../js/gerente_login.js" defer></script>
</body>
</html>
