<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusTrack - Cadastro de Organizacao</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <style>
    :root {
      --bs-primary: #1e40af;
      --bs-primary-rgb: 30, 64, 175;
      --ct-gray-card: #f3f4f6;
      --ct-border: #d1d5db;
    }
    body {
      background-color: #fff;
      color: #212529;
    }
    .btn-primary:hover {
      background-color: #1d4ed8;
      border-color: #1d4ed8;
    }
  </style>
</head>
<body>
  <main class="container py-4 py-sm-5 min-vh-100 d-flex flex-column align-items-center justify-content-center" style="max-width: 30rem;">
    <header class="text-center w-100 mb-4">
      <img
        src="../../../assets/logo-campustrack.png"
        alt="CampusTrack"
        width="120"
        class="img-fluid mb-3"
      >
      <h1 class="h4 fw-bold text-primary">Cadastro de Organizacao</h1>
      <p class="text-muted">Cadastre os dados da organizacao para acessar o CampusTrack.</p>
    </header>

    <div id="alerta-msg" class="alert d-none w-100" role="alert"></div>

    <form id="form-organizacao-cadastro" class="w-100 d-flex flex-column gap-3">
      <div class="form-group">
        <label for="organizacao-nome" class="form-label fw-medium">Nome</label>
        <input type="text" id="organizacao-nome" name="nome" class="form-control form-control-lg bg-light" maxlength="255" required>
      </div>

      <div class="form-group">
        <label for="organizacao-cnpj" class="form-label fw-medium">CNPJ</label>
        <input type="text" id="organizacao-cnpj" name="cnpj" class="form-control form-control-lg bg-light" placeholder="00000000000000" maxlength="14" required>
      </div>

      <div class="form-group">
        <label for="organizacao-senha" class="form-label fw-medium">Senha</label>
        <input type="password" id="organizacao-senha" name="senha" class="form-control form-control-lg bg-light" maxlength="30" required>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-100 mt-2" id="btn-organizacao-cadastrar">
        Cadastrar
      </button>
    </form>

    <p class="text-center mt-3 mb-0">
      <a href="login.html?tipo=organizacao" class="link-primary">Voltar ao login</a>
    </p>
  </main>

  <script src="../../js/organizacao_cadastro.js" defer></script>
</body>
</html>
