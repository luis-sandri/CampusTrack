<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusTrack - Recuperação de Senha — Organização</title>
  <meta name="description" content="CampusTrack: recuperação de senha para organizações.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <style>
    :root {
      --bs-primary: #1e40af;
      --bs-primary-rgb: 30, 64, 175;
      --ct-gray-card: #f3f4f6;
      --ct-border: #d1d5db;
    }
    body {
      background-color: #fff;
      color: #212529;
    }
    .btn-primary:hover {
      background-color: #1d4ed8;
      border-color: #1d4ed8;
    }
  </style>
</head>
<body>
  <main class="container py-4 py-sm-5 min-vh-100 d-flex flex-column align-items-center justify-content-center" style="max-width: 30rem;">
    <header class="text-center w-100 mb-4">
      <img
        src="../../../assets/logo-campustrack.png"
        alt="CampusTrack"
        width="120"
        class="img-fluid mb-3"
      >
      <h1 class="h4 fw-bold text-primary">Recuperação de Senha</h1>
      <p class="text-muted" id="instrucao-texto">Informe o CNPJ da organização e um e-mail de contato para receber o código de recuperação.</p>
    </header>

    <div id="alerta-msg" class="alert d-none w-100" role="alert"></div>

    <form id="form-email" class="w-100 d-flex flex-column gap-3">
      <input type="hidden" name="perfil" value="organizacao">
      <div class="form-group">
        <label for="cnpj" class="form-label fw-medium">CNPJ <span class="text-danger">*</span></label>
        <input type="text" id="cnpj" name="cnpj" class="form-control form-control-lg bg-light" placeholder="00.000.000/0000-00" maxlength="18" required>
      </div>
      <div class="form-group">
        <label for="email" class="form-label fw-medium">E-mail de Contato <span class="text-danger">*</span></label>
        <input type="email" id="email" name="email" class="form-control form-control-lg bg-light" placeholder="nome@email.com" maxlength="255" required>
        <div class="form-text">O código será enviado para este e-mail.</div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-100 mt-2" id="btn-enviar-email">
        Receber código
      </button>
    </form>

    <form id="form-nova-senha" class="w-100 d-flex flex-column gap-3 d-none">
      <div class="form-group">
        <label for="codigo" class="form-label fw-medium">Código de Verificação (6 dígitos)</label>
        <input type="text" id="codigo" name="codigo" class="form-control form-control-lg bg-light text-center fs-4" maxlength="6" pattern="\d{6}" placeholder="000000" autocomplete="off" required>
        <div class="form-text">O código foi enviado para o e-mail informado.</div>
      </div>

      <div class="form-group">
        <label for="senha_nova" class="form-label fw-medium">Nova Senha</label>
        <input type="password" id="senha_nova" name="senha_nova" class="form-control form-control-lg bg-light" maxlength="30" title="Minimo de 8 caracteres, com letra maiuscula, numero e simbolo." required>
        <div class="form-text">Pelo menos 8 caracteres, 1 maiúscula, 1 número e 1 símbolo.</div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-100 mt-2" id="btn-redefinir">
        Redefinir senha
      </button>

      <button type="button" class="btn btn-outline-secondary btn-lg w-100" id="btn-voltar">
        Voltar
      </button>
    </form>

    <p class="text-center mt-3 mb-0">
      <a href="login.html" class="link-primary">Voltar ao login</a>
    </p>
  </main>

  <script src="../../js/recuperar_senha_organizacao.js" defer></script>
</body>
</html>
