<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusTrack — Instituição</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    :root { --bs-primary: #1e40af; --bs-primary-rgb: 30, 64, 175; }
  </style>
</head>
<body class="bg-white min-vh-100 d-flex align-items-center">
  <div class="container py-4" style="max-width: 28rem;">
    <h1 class="h4 fw-bold text-primary text-center mb-4">Instituição</h1>
    <p class="text-center text-secondary mb-1">Instituição selecionada (ID):</p>
    <p id="id-instituicao" class="text-center fw-semibold fs-5 text-body" aria-live="polite">—</p>
    <p class="text-center text-muted small mt-4 mb-0">Página da instituição (conteúdo a definir).</p>
    <p class="text-center mt-3">
      <a href="../index.html" class="link-primary">Voltar ao início</a>
    </p>
  </div>
  <script>
    var params = new URLSearchParams(window.location.search);
    var id = params.get('id');
    document.getElementById('id-instituicao').textContent = id || '—';
  </script>
</body>
</html>
