<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusTrack - Mapa da instituicao</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    :root {
      --bs-primary: #1e40af;
      --bs-primary-rgb: 30, 64, 175;
      --ct-border: #d1d5db;
    }
    body {
      background-color: #f8f9fa;
      color: #212529;
    }
    .ct-map-shell {
      min-height: calc(100vh - 73px);
      padding: 1rem;
    }
    .ct-map {
      min-height: calc(100vh - 105px);
      border: 1px solid var(--ct-border);
      background:
        linear-gradient(90deg, rgba(209, 213, 219, 0.6) 1px, transparent 1px),
        linear-gradient(rgba(209, 213, 219, 0.6) 1px, transparent 1px),
        radial-gradient(circle at 24% 28%, rgba(30, 64, 175, 0.12), transparent 14rem),
        radial-gradient(circle at 72% 62%, rgba(22, 163, 74, 0.10), transparent 15rem),
        #ffffff;
      background-size: 56px 56px, 56px 56px, auto, auto, auto;
      position: relative;
      overflow: hidden;
    }
    .ct-map-panel {
      max-width: 24rem;
      position: absolute;
      left: 1rem;
      top: 1rem;
      z-index: 2;
    }
    .ct-map-actions {
      position: absolute;
      right: 1rem;
      top: 1rem;
      z-index: 2;
    }
    .ct-map-pin {
      width: 1rem;
      height: 1rem;
      border-radius: 999px;
      background-color: #1e40af;
      border: 3px solid #ffffff;
      box-shadow: 0 0.25rem 0.75rem rgba(30, 64, 175, 0.35);
      position: absolute;
    }
    .ct-map-empty {
      min-height: inherit;
    }
    @media (max-width: 575.98px) {
      .ct-map-shell {
        padding: 0.75rem;
      }
      .ct-map {
        min-height: calc(100vh - 97px);
      }
      .ct-map-panel,
      .ct-map-actions {
        left: 0.75rem;
        right: 0.75rem;
      }
      .ct-map-actions {
        top: auto;
        bottom: 0.75rem;
      }
    }
  </style>
</head>
<body class="min-vh-100 d-flex flex-column">
  <nav class="navbar navbar-expand-lg border-bottom bg-white">
    <div class="container-fluid px-3 px-sm-4 py-2">
      <a class="navbar-brand fw-bold text-primary" href="../index.html">
        <img src="../../../assets/logo-campustrack.png" alt="CampusTrack" width="40" height="40" class="d-inline-block align-text-top me-2">
        CampusTrack
      </a>
      <a href="../index.html" class="btn btn-outline-primary btn-sm">Trocar instituicao</a>
    </div>
  </nav>

  <main class="ct-map-shell flex-grow-1">
    <section id="mapa-locais" class="ct-map rounded-3" aria-labelledby="mapa-titulo">
      <div class="ct-map-panel bg-white border rounded-3 p-3 shadow-sm">
        <h1 id="mapa-titulo" class="h5 fw-bold text-primary mb-1">Mapa da instituicao</h1>
        <p class="text-secondary small mb-0">Instituicao selecionada: <span id="id-instituicao" class="fw-semibold">-</span></p>
      </div>

      <div class="ct-map-actions">
        <a id="btn-cadastro-aluno" href="../estudante/login.html" class="btn btn-primary shadow-sm">
          Cadastrar aluno
        </a>
      </div>

      <div id="mapa-vazio" class="ct-map-empty d-flex align-items-center justify-content-center text-muted px-4 text-center">
        Carregando mapa da instituicao...
      </div>
    </section>
  </main>

  <script src="../../js/estudante_login.js" defer></script>
</body>
</html>
