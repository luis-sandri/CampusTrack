<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusTrack - Editar organizador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --bs-primary: #1e40af; }
  </style>
</head>
<body>
  <nav class="navbar bg-body-tertiary border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary fs-4" href="../index.html">CT</a>
      <div class="btn-group dropstart">
        <button type="button" class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
          Menu
        </button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item link-primary" href="../index.html">Pagina inicial</a></li>
          <li><a class="dropdown-item link-primary" href="gerenciar_organizador.html">Gerenciar organizadores</a></li>
          <li><a class="dropdown-item link-primary" href="organizacao_cadastro.html">Cadastrar organizacao</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h1 class="mb-4">Editar organizador</h1>
    <div class="card mb-5">
      <div class="card-header">
        <h5 class="card-title mb-0">Adicionar / Editar organizador</h5>
      </div>
      <div class="card-body">
        <form id="form-organizador">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="organizador-id_usuario" class="form-label">ID do organizador</label>
              <input type="text" class="form-control" id="organizador-id_usuario" readonly>
            </div>
            <div class="col-md-6 mb-3">
              <label for="organizador-nome" class="form-label">Nome <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="organizador-nome" maxlength="255" required>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="organizador-email" class="form-label">E-mail <span class="text-danger">*</span></label>
              <input type="email" class="form-control" id="organizador-email" maxlength="255" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="organizador-senha" class="form-label">Senha <span class="text-danger">*</span></label>
              <input type="password" class="form-control" id="organizador-senha" maxlength="30" required>
            </div>
          </div>
          <div>
            <button id="enviar" type="submit" class="btn btn-primary">Salvar</button>
            <button type="button" class="btn btn-secondary" id="btn-cancelar" onclick="window.location.href='gerenciar_organizador.html'">Cancelar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/organizador_alterar.js"></script>
</body>
</html>
