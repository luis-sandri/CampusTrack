<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusTrack — Selecionar instituição</title>
  <meta name="description" content="CampusTrack: escolha sua instituição para continuar.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    :root {
      --bs-primary: #1e40af;
      --bs-primary-rgb: 30, 64, 175;
      --ct-gray-card: #f3f4f6;
      --ct-border: #d1d5db;
    }
    body {
      background-color: #fff;
      color: #212529;
    }
    .btn-primary:hover {
      background-color: #1d4ed8;
      border-color: #1d4ed8;
    }
    .btn-ct-secondary {
      color: #1e40af;
      background-color: var(--ct-gray-card);
      border: 2px solid var(--ct-border);
      font-weight: 600;
    }
    .btn-ct-secondary:hover {
      color: #1e40af;
      background-color: #e5e7eb;
      border-color: #9ca3af;
    }
    .ct-card-btn {
      border: 1px solid var(--ct-border);
      background-color: var(--ct-gray-card);
    }
    .ct-card-btn:hover {
      background-color: #e5e7eb;
      border-color: #9ca3af;
    }
    .ct-iniciais {
      width: 3rem;
      height: 3rem;
      background-color: #e5e7eb;
      font-weight: 700;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <a href="#conteudo-principal" class="visually-hidden-focusable position-absolute start-0 top-0 z-3 btn btn-primary m-2 shadow-sm">
    Pular para o conteúdo principal!
  </a>

  <main id="conteudo-principal" class="container py-4 py-sm-5 min-vh-100 d-flex flex-column" style="max-width: 42rem;">
    <header class="text-center">
      <img
        src="../../assets/logo-campustrack.png"
        alt="CampusTrack — localização e campus universitário"
        width="160"
        height="160"
        class="img-fluid"
        style="max-height: 10rem; width: auto;"
        decoding="async"
      >
      <h1 class="mt-4 h4 fw-bold text-primary">
        Selecionar instituição
      </h1>
    </header>

    <section class="mt-4 flex-grow-1" aria-labelledby="lista-instituicoes-titulo">
      <h2 id="lista-instituicoes-titulo" class="visually-hidden">Lista de instituições disponíveis</h2>
      <ul class="list-unstyled d-flex flex-column gap-3 mb-0">
        <li>
          <button
            type="button"
            class="js-instituicao btn ct-card-btn rounded-3 py-3 px-3 w-100 d-flex align-items-center gap-3 text-start shadow-sm"
            data-id="1"
            aria-label="Selecionar instituição: Universidade Federal de Exemplo"
          >
            <span class="ct-iniciais rounded-2 flex-shrink-0 d-inline-flex align-items-center justify-content-center text-dark" aria-hidden="true">UF</span>
            <span class="flex-grow-1 text-body fw-medium text-truncate">Universidade Federal de Exemplo</span>
            <svg class="flex-shrink-0 text-secondary" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
            </svg>
          </button>
        </li>
        <li>
          <button
            type="button"
            class="js-instituicao btn ct-card-btn rounded-3 py-3 px-3 w-100 d-flex align-items-center gap-3 text-start shadow-sm"
            data-id="2"
            aria-label="Selecionar instituição: Instituto Tecnológico Regional"
          >
            <span class="ct-iniciais rounded-2 flex-shrink-0 d-inline-flex align-items-center justify-content-center text-dark" aria-hidden="true">IT</span>
            <span class="flex-grow-1 text-body fw-medium text-truncate">Instituto Tecnológico Regional</span>
            <svg class="flex-shrink-0 text-secondary" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
            </svg>
          </button>
        </li>
        <li>
          <button
            type="button"
            class="js-instituicao btn ct-card-btn rounded-3 py-3 px-3 w-100 d-flex align-items-center gap-3 text-start shadow-sm"
            data-id="3"
            aria-label="Selecionar instituição: Faculdade Municipal do Norte"
          >
            <span class="ct-iniciais rounded-2 flex-shrink-0 d-inline-flex align-items-center justify-content-center text-dark" aria-hidden="true">FM</span>
            <span class="flex-grow-1 text-body fw-medium text-truncate">Faculdade Municipal do Norte</span>
            <svg class="flex-shrink-0 text-secondary" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
            </svg>
          </button>
        </li>
      </ul>
    </section>

    <footer class="mt-5 d-flex flex-column gap-3" aria-label="Formas de acesso">
      <button type="button" id="btn-organizacao" class="btn btn-primary btn-lg py-3 fw-semibold">
        Entrar como organização
      </button>
      <button type="button" id="btn-gerente" class="btn btn-ct-secondary btn-lg py-3">
        Entrar como gerente de blocos
      </button>
    </footer>
  </main>

  <script src="../js/home.js" defer></script>
</body>
</html>
