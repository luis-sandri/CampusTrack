<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusTrack — Editar gerente</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --bs-primary: #1e40af; }
  </style>
</head>
<body>
  <nav class="navbar bg-body-tertiary border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary fs-4" href="../index.html">CT</a>
      <div class="btn-group dropstart">
        <button type="button" class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
          Menu
        </button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item link-primary" href="../index.html">Página inicial</a></li>
          <li><a class="dropdown-item link-primary" href="gerenciar_gerente.html">Gerenciar gerentes</a></li>
          <li><a class="dropdown-item link-primary" href="gerenciar_instituicao.html">Gerenciar instituições</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h1 class="mb-4">Editar gerente</h1>
    <div class="card mb-5">
      <div class="card-header">
        <h5 class="card-title mb-0">Adicionar / Editar gerente</h5>
      </div>
      <div class="card-body">
        <form id="form-gerente">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="gerente-id_usuario" class="form-label">ID do gerente</label>
              <input type="text" class="form-control" id="gerente-id_usuario" readonly>
            </div>
            <div class="col-md-6 mb-3">
              <label for="gerente-nome" class="form-label">Nome</label>
              <input type="text" class="form-control" id="gerente-nome" maxlength="255" required>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="gerente-email" class="form-label">E-mail</label>
              <input type="email" class="form-control" id="gerente-email" maxlength="255" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="gerente-senha" class="form-label">Senha</label>
              <input type="text" class="form-control" id="gerente-senha" maxlength="30" required>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="gerente-id_instituicao" class="form-label">Instituição</label>
              <select id="gerente-id_instituicao" class="form-control" required>
                <option value="">Carregando…</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label for="gerente-escola" class="form-label">Escola</label>
              <input type="text" class="form-control" id="gerente-escola" maxlength="30" placeholder="Ex: Escola Politécnica">
            </div>
          </div>
          <div>
            <button id="enviar" type="submit" class="btn btn-primary">Salvar</button>
            <button type="button" class="btn btn-secondary" id="btn-cancelar" onclick="window.location.href='gerenciar_gerente.html'">Cancelar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/valida_sessao.js"></script>
  <script src="../../js/gerente_alterar.js"></script>
</body>
</html>
