<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusTrack - Cadastro de Estudante</title>
  <meta name="description" content="CampusTrack: cadastro de estudante com e-mail institucional.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <style>
    :root {
      --bs-primary: #1e40af;
      --bs-primary-rgb: 30, 64, 175;
      --ct-gray-card: #f3f4f6;
      --ct-border: #d1d5db;
    }
    body {
      background-color: #fff;
      color: #212529;
    }
    .btn-primary:hover {
      background-color: #1d4ed8;
      border-color: #1d4ed8;
    }
  </style>
</head>
<body>
  <main class="container py-4 py-sm-5 min-vh-100 d-flex flex-column align-items-center justify-content-center" style="max-width: 30rem;">
    <header class="text-center w-100 mb-4">
      <img
        src="../../../assets/logo-campustrack.png"
        alt="CampusTrack"
        width="120"
        class="img-fluid mb-3"
      >
      <h1 class="h4 fw-bold text-primary">Cadastro de Estudante</h1>
      <p class="text-muted" id="instrucao-texto">Preencha seus dados e valide o codigo enviado ao e-mail institucional.</p>
    </header>

    <div id="alerta-msg" class="alert d-none w-100" role="alert"></div>

    <form id="form-email" class="w-100 d-flex flex-column gap-3">
      <input type="hidden" name="id_instituicao" id="id_instituicao" value="">
      <input type="hidden" name="email_verificacao" id="email_verificacao" value="">

      <div class="form-group">
        <label for="nome" class="form-label fw-medium">Nome <span class="text-danger">*</span></label>
        <input type="text" id="nome" name="nome" class="form-control form-control-lg bg-light" maxlength="255" required>
      </div>

      <div class="form-group">
        <label for="email" class="form-label fw-medium">E-mail Institucional (@pucpr.edu.br) <span class="text-danger">*</span></label>
        <input type="email" id="email" name="email" class="form-control form-control-lg bg-light" placeholder="nome@pucpr.edu.br" maxlength="255" required>
      </div>

      <div class="form-group">
        <label for="senha" class="form-label fw-medium">Senha <span class="text-danger">*</span></label>
        <input type="password" id="senha" name="senha" class="form-control form-control-lg bg-light" maxlength="30" required>
      </div>

      <div class="form-group">
        <label for="curso" class="form-label fw-medium">Curso <span class="text-danger">*</span></label>
        <input type="text" id="curso" name="curso" class="form-control form-control-lg bg-light" maxlength="80" required>
      </div>

      <button type="button" class="btn btn-outline-primary btn-lg w-100 mt-2" id="btn-enviar-email">
        Receber codigo
      </button>

      <div class="form-group">
        <label for="codigo" class="form-label fw-medium">Codigo de Verificacao (6 digitos) <span class="text-danger">*</span></label>
        <input type="text" id="codigo" name="codigo" class="form-control form-control-lg bg-light text-center fs-4" maxlength="6" pattern="\d{6}" placeholder="000000" autocomplete="off" required>
        <div class="form-text">O codigo foi enviado para o seu e-mail.</div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-100 mt-2" id="btn-verificar-codigo">
        Validar
      </button>
    </form>

    <p class="text-center mt-3 mb-0">
      <a id="link-voltar-mapa" href="../index.html" class="link-primary">Voltar ao mapa</a>
    </p>
  </main>

  <script src="../../js/estudante_login.js" defer></script>
</body>
</html>
