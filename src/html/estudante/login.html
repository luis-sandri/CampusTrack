<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusTrack — Login de Estudante</title>
  <meta name="description" content="CampusTrack: login de estudante com e-mail institucional.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <style>
    :root {
      --bs-primary: #1e40af;
      --bs-primary-rgb: 30, 64, 175;
      --ct-gray-card: #f3f4f6;
      --ct-border: #d1d5db;
    }
    body {
      background-color: #fff;
      color: #212529;
    }
    .btn-primary:hover {
      background-color: #1d4ed8;
      border-color: #1d4ed8;
    }
  </style>
</head>
<body>
  <main class="container py-4 py-sm-5 min-vh-100 d-flex flex-column align-items-center justify-content-center" style="max-width: 30rem;">
    <header class="text-center w-100 mb-4">
      <img
        src="../../../assets/logo-campustrack.png"
        alt="CampusTrack"
        width="120"
        class="img-fluid mb-3"
      >
      <h1 class="h4 fw-bold text-primary">Login de Estudante</h1>
      <p class="text-muted" id="instrucao-texto">Informe seu e-mail institucional para acessar.</p>
    </header>

    <!-- Alerta de Mensagem -->
    <div id="alerta-msg" class="alert d-none w-100" role="alert"></div>

    <!-- Etapa 1: Enviar Email -->
    <form id="form-email" class="w-100 d-flex flex-column gap-3">
        <input type="hidden" name="id_instituicao" id="id_instituicao" value="">
        <div class="form-group">
            <label for="email" class="form-label fw-medium">E-mail Institucional (@pucpr.edu.br)</label>
            <input type="email" id="email" name="email" class="form-control form-control-lg bg-light" placeholder="nome@pucpr.edu.br" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100 mt-2" id="btn-enviar-email">
            Receber código de acesso
        </button>
    </form>

    <!-- Etapa 2: Inserir Código -->
    <form id="form-codigo" class="w-100 d-flex flex-column gap-3 d-none">
        <input type="hidden" name="email_verificacao" id="email_verificacao" value="">
        <div class="form-group">
            <label for="codigo" class="form-label fw-medium">Código de Verificação (6 dígitos)</label>
            <input type="text" id="codigo" name="codigo" class="form-control form-control-lg bg-light text-center fs-4 letter-spacing-1" maxlength="6" pattern="\d{6}" placeholder="000000" autocomplete="off" required>
            <div class="form-text">O código foi enviado para o seu e-mail.</div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100 mt-2" id="btn-verificar-codigo">
            Validar acesso
        </button>
        <button type="button" class="btn btn-link text-decoration-none mt-1" id="btn-voltar">
            Usar outro e-mail
        </button>
    </form>

  </main>

  <script src="../../js/estudante_login.js" defer></script>
</body>
</html>
