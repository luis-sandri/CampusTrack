<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusTrack — Painel do Estudante</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <style>
    :root {
      --bs-primary: #1e40af;
      --bs-primary-rgb: 30, 64, 175;
      --ct-gray-card: #f3f4f6;
      --ct-border: #d1d5db;
    }
    body {
      background-color: #f8f9fa;
      color: #212529;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg border-bottom bg-white">
    <div class="container py-2">
      <a class="navbar-brand fw-bold text-primary" href="#">
        <img src="../../../assets/logo-campustrack.png" alt="Logo" width="40" height="40" class="d-inline-block align-text-top me-2">
        CampusTrack | Estudante
      </a>
      <div class="d-flex">
          <span class="navbar-text me-3 fw-medium" id="usuario-email"></span>
          <a href="../index.html" class="btn btn-outline-danger btn-sm">Sair</a>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row">
      <div class="col-12 text-center">
        <h1 class="h2 fw-bold text-primary mb-3">Bem-vindo, Estudante.</h1>
        <p class="lead text-muted">Acesso validado com sucesso através da autenticação de dois fatores.</p>
        
        <div class="alert alert-success d-inline-block mt-4" role="alert">
            Login realizado com sucesso. (Página em construção).
        </div>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
        // Mock email show
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        if(email) {
            document.getElementById('usuario-email').textContent = email;
        }
    });
  </script>
</body>
</html>
