<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusTrack - Eventos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <style>
    :root {
      --bs-primary: #1e40af;
      --bs-primary-rgb: 30, 64, 175;
    }
    body {
      background-color: #f8f9fa;
      color: #212529;
      padding-bottom: calc(4.75rem + env(safe-area-inset-bottom));
    }
    .ct-page {
      min-height: calc(100vh - 4.75rem);
      min-height: calc(100svh - 4.75rem);
    }
    .ct-event-card {
      border-color: #d1d5db;
      border-radius: 0.5rem;
    }
    .ct-event-meta {
      color: #4b5563;
      font-size: 0.92rem;
    }
    .ct-mobile-tabbar {
      align-items: stretch;
      background-color: #ffffff;
      border-top: 1px solid #d1d5db;
      bottom: 0;
      box-shadow: 0 -0.35rem 1rem rgba(15, 23, 42, 0.08);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      left: 0;
      padding: 0.35rem 0.5rem calc(0.35rem + env(safe-area-inset-bottom));
      position: fixed;
      right: 0;
      z-index: 950;
    }
    .ct-mobile-tabbar a {
      align-items: center;
      border-radius: 0.625rem;
      color: #6b7280;
      display: flex;
      flex-direction: column;
      font-size: 0.68rem;
      font-weight: 600;
      justify-content: center;
      min-height: 3.35rem;
      text-decoration: none;
    }
    .ct-mobile-tabbar a.active {
      background-color: rgba(30, 64, 175, 0.08);
      color: #1e40af;
    }
  </style>
</head>
<body>
  <main class="ct-page container py-4">
    <header class="mb-4">
      <img src="../../../assets/logo-campustrack.png" alt="CampusTrack" width="48" height="48" class="mb-3">
      <h1 class="h4 fw-bold text-primary mb-1">Evntos</h1>
      <p class="text-secondary mb-0">Eventos ativos disponiveis na instituicao.</p>
    </header>

    <section id="alerta-eventos" class="alert d-none" role="alert"></section>
    <section id="lista-eventos" class="row g-3" aria-live="polite"></section>
  </main>

  <nav class="ct-mobile-tabbar" aria-label="Navegacao do estudante">
    <a data-tab="mapa" href="../visitante/instituicao.html">Mapa</a>
    <a class="active" data-tab="eventos" href="eventos.html">Eventos</a>
    <a data-tab="favoritos" href="favoritos.html">Favoritos</a>
    <a data-tab="perfil" href="perfil.html">Perfil</a>
  </nav>

  <script src="../../js/estudante_nav.js" defer></script>
  <script src="../../js/estudante_eventos.js" defer></script>
</body>
</html>
