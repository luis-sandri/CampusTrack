<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusTrack - Meus Favoritos</title>
  <meta name="description" content="CampusTrack: gerencie seus locais favoritos na instituicao.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <style>
    :root {
      --bs-primary: #1e40af;
      --bs-primary-rgb: 30, 64, 175;
      --ct-border: #d1d5db;
      --ct-muted: #6b7280;
    }
    body {
      background-color: #f8f9fa;
      color: #212529;
    }
    .ct-desktop-nav {
      display: flex;
      gap: 0.25rem;
      margin-left: 0.75rem;
    }
    .ct-desktop-nav a {
      border-radius: 0.5rem;
      color: #4b5563;
      font-size: 0.92rem;
      font-weight: 600;
      padding: 0.45rem 0.7rem;
      text-decoration: none;
    }
    .ct-desktop-nav a:hover,
    .ct-desktop-nav a:focus,
    .ct-desktop-nav a.active {
      background-color: rgba(30, 64, 175, 0.08);
      color: #1e40af;
    }
    .ct-page {
      min-height: calc(100vh - 73px);
      min-height: calc(100svh - 73px);
    }
    .ct-favorite-card {
      border-color: var(--ct-border);
      border-radius: 0.5rem;
    }
    .ct-favorite-star {
      color: #f59e0b;
      flex: 0 0 auto;
      font-size: 1.25rem;
      line-height: 1;
    }
    .ct-mobile-tabbar {
      display: none;
    }
    @media (max-width: 767.98px) {
      body {
        padding-bottom: calc(4.75rem + env(safe-area-inset-bottom));
      }
      .navbar .container-fluid {
        gap: 0.75rem;
      }
      .navbar-brand {
        align-items: center;
        display: flex;
        font-size: 1rem;
        min-width: 0;
      }
      .navbar-brand img {
        height: 32px;
        width: 32px;
      }
      .ct-desktop-nav {
        display: none;
      }
      .ct-page {
        min-height: calc(100vh - 65px - 4.75rem);
        min-height: calc(100svh - 65px - 4.75rem);
      }
      .ct-mobile-tabbar {
        align-items: stretch;
        background-color: #ffffff;
        border-top: 1px solid #d1d5db;
        bottom: 0;
        box-shadow: 0 -0.35rem 1rem rgba(15, 23, 42, 0.08);
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        left: 0;
        padding: 0.35rem 0.5rem calc(0.35rem + env(safe-area-inset-bottom));
        position: fixed;
        right: 0;
        z-index: 950;
      }
      .ct-mobile-tabbar a {
        align-items: center;
        border-radius: 0.625rem;
        color: #6b7280;
        display: flex;
        flex-direction: column;
        font-size: 0.68rem;
        font-weight: 600;
        gap: 0.16rem;
        justify-content: center;
        min-height: 3.35rem;
        text-decoration: none;
      }
      .ct-mobile-tabbar a::before {
        background-color: currentColor;
        content: "";
        height: 1.1rem;
        width: 1.1rem;
      }
      .ct-mobile-tabbar a[data-tab="mapa"]::before {
        clip-path: polygon(50% 0, 90% 28%, 90% 82%, 50% 100%, 10% 82%, 10% 28%);
      }
      .ct-mobile-tabbar a[data-tab="eventos"]::before {
        border-radius: 0.18rem;
        clip-path: inset(0);
      }
      .ct-mobile-tabbar a[data-tab="favoritos"]::before {
        clip-path: polygon(50% 4%, 61% 35%, 95% 35%, 68% 55%, 79% 90%, 50% 68%, 21% 90%, 32% 55%, 5% 35%, 39% 35%);
      }
      .ct-mobile-tabbar a[data-tab="perfil"]::before {
        border-radius: 999px 999px 0.35rem 0.35rem;
        clip-path: polygon(50% 0, 72% 18%, 72% 42%, 88% 58%, 88% 100%, 12% 100%, 12% 58%, 28% 42%, 28% 18%);
      }
      .ct-mobile-tabbar a.active {
        background-color: rgba(30, 64, 175, 0.08);
        color: #1e40af;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg border-bottom bg-white">
    <div class="container-fluid px-3 px-sm-4 py-2">
      <div class="d-flex align-items-center">
        <a class="navbar-brand fw-bold text-primary me-0" href="../index.html">
          <img src="../../../assets/logo-campustrack.png" alt="CampusTrack" width="40" height="40" class="d-inline-block align-text-top me-2">
          CampusTrack
        </a>
        <nav class="ct-desktop-nav" aria-label="Secoes do estudante">
          <a data-tab="mapa" href="../visitante/instituicao.html">Mapa</a>
          <a data-tab="eventos" href="eventos.html">Eventos</a>
          <a class="active" data-tab="favoritos" href="favoritos.html">Favoritos</a>
          <a data-tab="perfil" href="perfil.html">Perfil</a>
        </nav>
      </div>
    </div>
  </nav>

  <main class="ct-page container py-4 py-md-5">
    <header class="mb-4">
      <p class="text-secondary small fw-semibold mb-1">Locais salvos</p>
      <h1 class="h3 fw-bold text-primary mb-1">Meus favoritos</h1>
      <p class="text-secondary mb-0">Acesse rapidamente os locais que voce marcou no mapa da instituicao.</p>
    </header>

    <div id="lista-favoritos" aria-live="polite">
      <p class="text-muted">Carregando favoritos...</p>
    </div>
  </main>

  <nav class="ct-mobile-tabbar" aria-label="Navegacao do estudante">
    <a data-tab="mapa" href="../visitante/instituicao.html">Mapa</a>
    <a data-tab="eventos" href="eventos.html">Eventos</a>
    <a class="active" data-tab="favoritos" href="favoritos.html">Favoritos</a>
    <a data-tab="perfil" href="perfil.html">Perfil</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="../../js/valida_sessao.js?v=perfil-favoritos-20260525"></script>
  <script src="../../js/estudante_nav.js?v=perfil-favoritos-20260525"></script>
  <script src="../../js/favoritos.js?v=perfil-favoritos-20260525"></script>
</body>
</html>
