<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusTrack - Favoritos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <style>
    :root {
      --bs-primary: #1e40af;
      --bs-primary-rgb: 30, 64, 175;
    }
    body {
      background-color: #f8f9fa;
      color: #212529;
      padding-bottom: calc(4.75rem + env(safe-area-inset-bottom));
    }
    .ct-placeholder {
      min-height: calc(100vh - 4.75rem);
      min-height: calc(100svh - 4.75rem);
    }
    .ct-fav-card {
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      background-color: #ffffff;
      transition: box-shadow 0.2s;
    }
    .ct-fav-card:hover {
      box-shadow: 0 0.25rem 0.75rem rgba(15, 23, 42, 0.08);
    }
    .ct-btn-desfavoritar {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.25rem;
      line-height: 1;
      padding: 0.1rem 0.25rem;
      color: #f59e0b;
      transition: color 0.2s, transform 0.2s;
    }
    .ct-btn-desfavoritar:hover {
      color: #d97706;
      transform: scale(1.15);
    }
    .ct-mobile-tabbar {
      align-items: stretch;
      background-color: #ffffff;
      border-top: 1px solid #d1d5db;
      bottom: 0;
      box-shadow: 0 -0.35rem 1rem rgba(15, 23, 42, 0.08);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      left: 0;
      padding: 0.35rem 0.5rem calc(0.35rem + env(safe-area-inset-bottom));
      position: fixed;
      right: 0;
      z-index: 950;
    }
    .ct-mobile-tabbar a {
      align-items: center;
      border-radius: 0.625rem;
      color: #6b7280;
      display: flex;
      flex-direction: column;
      font-size: 0.68rem;
      font-weight: 600;
      justify-content: center;
      min-height: 3.35rem;
      text-decoration: none;
    }
    .ct-mobile-tabbar a.active {
      background-color: rgba(30, 64, 175, 0.08);
      color: #1e40af;
    }
  </style>
</head>
<body>
  <main class="container py-4 py-sm-5" style="max-width: 42rem;">
    <header class="text-center mb-4">
      <img src="../../../assets/logo-campustrack.png" alt="CampusTrack" width="48" height="48" class="mb-3">
      <h1 class="h4 fw-bold text-primary">Favoritos</h1>
      <p class="text-secondary small mb-0">Seus locais favoritos aparecem aqui.</p>
    </header>

    <div id="alerta-favoritos" class="alert d-none" role="alert"></div>

    <div id="lista-favoritos" class="d-flex flex-column gap-3">
      <div class="text-center text-muted py-4">Carregando favoritos...</div>
    </div>
  </main>

  <nav class="ct-mobile-tabbar" aria-label="Navegacao do estudante">
    <a data-tab="mapa" href="../visitante/instituicao.html">Mapa</a>
    <a data-tab="eventos" href="eventos.html">Eventos</a>
    <a class="active" data-tab="favoritos" href="favoritos.html">Favoritos</a>
    <a data-tab="perfil" href="perfil.html">Perfil</a>
  </nav>

  <script src="../../js/estudante_nav.js" defer></script>
  <script>
  document.addEventListener("DOMContentLoaded", function () {
      var listaFavoritos = document.getElementById("lista-favoritos");
      var alertaFavoritos = document.getElementById("alerta-favoritos");

      carregarListaFavoritos();

      function carregarListaFavoritos() {
          fetch("../../php/favorito_get.php")
          .then(function (response) {
              return response.json();
          })
          .then(function (resposta) {
              if (resposta.status !== "ok") {
                  mostrarAlerta("Faca login como estudante para ver seus favoritos.", "warning");
                  listaFavoritos.innerHTML = '<div class="text-center text-muted py-4">Nenhum favorito encontrado.</div>';
                  return;
              }

              if (!Array.isArray(resposta.data) || resposta.data.length === 0) {
                  listaFavoritos.innerHTML = '<div class="text-center text-muted py-4">Voce ainda nao favoritou nenhum local. Use a estrela no mapa para favoritar.</div>';
                  return;
              }

              var html = "";
              for (var i = 0; i < resposta.data.length; i++) {
                  var fav = resposta.data[i];
                  html += '<div class="ct-fav-card p-3 d-flex align-items-start justify-content-between gap-2">';
                  html += '<div>';
                  html += '<h2 class="h6 fw-bold mb-1">' + textoSeguro(fav.nome) + '</h2>';
                  html += '<p class="small text-muted mb-1">' + textoSeguro(fav.tipo_escola) + ' - ' + textoSeguro(fav.tipo) + '</p>';
                  if (fav.capacidade) {
                      html += '<p class="small mb-0">Capacidade: ' + textoSeguro(fav.capacidade) + '</p>';
                  }
                  html += '</div>';
                  html += '<button type="button" class="ct-btn-desfavoritar" data-remover-favorito="' + textoSeguro(fav.id_local) + '" title="Remover favorito">&#9733;</button>';
                  html += '</div>';
              }

              listaFavoritos.innerHTML = html;
          })
          .catch(function () {
              listaFavoritos.innerHTML = '<div class="text-center text-muted py-4">Erro de conexao ao carregar favoritos.</div>';
          });
      }

      listaFavoritos.addEventListener("click", function (e) {
          var botao = e.target.closest("[data-remover-favorito]");
          if (!botao) {
              return;
          }

          var idLocal = botao.getAttribute("data-remover-favorito");
          var dados = new FormData();
          dados.append("id_local", idLocal);

          fetch("../../php/favorito_adicionar.php", {
              method: "POST",
              body: dados
          })
          .then(function (response) {
              return response.json();
          })
          .then(function (resposta) {
              if (resposta.status === "ok") {
                  carregarListaFavoritos();
              } else {
                  mostrarAlerta(resposta.mensagem || "Erro ao remover favorito.", "danger");
              }
          })
          .catch(function () {
              mostrarAlerta("Erro de conexao.", "danger");
          });
      });

      function mostrarAlerta(mensagem, tipo) {
          if (!alertaFavoritos) {
              return;
          }

          alertaFavoritos.textContent = mensagem;
          alertaFavoritos.className = "alert alert-" + tipo;
      }

      function textoSeguro(valor) {
          return String(valor === null || valor === undefined ? "" : valor)
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;")
              .replace(/"/g, "&quot;")
              .replace(/'/g, "&#039;");
      }
  });
  </script>
</body>
</html>
