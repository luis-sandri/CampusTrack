<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusTrack — Consultar Disponibilidade</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --bs-primary: #1e40af; }
    .status-disponivel { color: #198754; font-weight: bold; }
    .status-ocupado { color: #dc3545; font-weight: bold; }
    .clickable-row { cursor: pointer; }
    .clickable-row:hover { background-color: #f8f9fa; }
  </style>
</head>
<body data-perfil="gerente">
  <nav class="navbar bg-body-tertiary border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary fs-4" href="../index.html">CT</a>
      <div class="btn-group dropstart">
        <button type="button" class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
          Menu
        </button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item link-primary" href="../index.html">Página inicial</a></li>
          <li><a class="dropdown-item link-primary" href="gerenciar_local.html">Gerenciar locais</a></li>
          <li><a class="dropdown-item link-primary active" href="consultar_disponibilidade.html" aria-current="page">Consultar disponibilidade</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h1 class="mb-4">Consultar Disponibilidade de Espaços</h1>

    <div class="card mb-4">
      <div class="card-body">
        <form id="form-busca" class="row g-3 align-items-end">
          <div class="col-md-4">
            <label for="data" class="form-label">Data e Horário</label>
            <input type="datetime-local" class="form-control" id="data" required>
          </div>
          <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">Buscar</button>
          </div>
        </form>
      </div>
    </div>

    <div id="mensagem-container" class="mb-4"></div>

    <div class="card mb-5 d-none" id="card-resultados">
      <div class="card-header">
        <h5 class="card-title mb-0">Resultados da Busca</h5>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-bordered">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Tipo</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="lista-locais">
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Detalhes -->
  <div class="modal fade" id="modalDetalhes" tabindex="-1" aria-labelledby="modalDetalhesLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalDetalhesLabel">Detalhes do Espaço</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p><strong>Nome:</strong> <span id="detalhe-nome"></span></p>
          <p><strong>Tipo:</strong> <span id="detalhe-tipo"></span></p>
          <p><strong>Capacidade:</strong> <span id="detalhe-capacidade"></span> pessoas</p>
          <p><strong>Status:</strong> <span id="detalhe-status"></span></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/valida_sessao.js"></script>
  <script src="../../js/consultar_disponibilidade.js"></script>
</body>
</html>
