<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --bs-primary: #1e40af; }
  </style>
</head>
<body data-perfil="gerente">
  <nav class="navbar bg-body-tertiary border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary fs-4" href="../index.html">CT</a>
      <div class="btn-group dropstart">
        <button type="button" class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
          Menu
        </button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item link-primary" href="../index.html">Página inicial</a></li>
          <li><a class="dropdown-item link-primary" href="gerenciar_local.html">Gerenciar locais</a></li>
          <li><a class="dropdown-item link-primary" href="gerenciar_eventos.html">Gerenciar eventos</a></li>
          <li><a class="dropdown-item link-primary active" href="disponibilidade_local.html" aria-current="page">Consultar disponibilidade</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h1 class="mb-4">Consultar disponibilidade</h1>

    <div class="card mb-4">
      <div class="card-body">
        <form id="formBusca">
          <div class="row align-items-end">
            <div class="col-md-6 mb-3 mb-md-0">
              <label for="data" class="form-label fw-bold">Data e Horário</label>
              <input type="datetime-local" class="form-control" id="data" required>
            </div>
            <div class="col-md-6">
              <button type="submit" class="btn btn-primary w-100">Consultar</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div id="mensagem" class="alert alert-warning d-none" role="alert"></div>

    <div class="card mb-5" id="cardResultados" style="display: none;">
      <div class="card-header">
        <h5 class="card-title mb-0">Eventos no período selecionado</h5>
      </div>
      <div class="card-body">
        <div id="lista" class="table-responsive"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
