<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusTrack — Adicionar local</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --bs-primary: #1e40af; }
  </style>
</head>
<body>
  <nav class="navbar bg-body-tertiary border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary fs-4" href="../index.html">CT</a>
      <div class="btn-group dropstart">
        <button type="button" class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
          Menu
        </button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item link-primary" href="../index.html">Página inicial</a></li>
          <li><a class="dropdown-item link-primary" href="gerenciar_local.html">Gerenciar locais</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h1 class="mb-4">Adicionar local</h1>
    <div class="card mb-5">
      <div class="card-header">
        <h5 class="card-title mb-0">Novo local</h5>
      </div>
      <div class="card-body">
        <form id="form-local">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="local-id_instituicao" class="form-label">Instituição</label>
              <select id="local-id_instituicao" class="form-control" required>
                <option value="">Carregando…</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label for="local-tipo" class="form-label">Tipo</label>
              <input type="text" class="form-control" id="local-tipo" maxlength="50">
            </div>
          </div>
          <div class="row">
            <div class="col-12 mb-3">
              <label for="local-nome" class="form-label">Nome</label>
              <input type="text" class="form-control" id="local-nome" maxlength="255" required>
            </div>
          </div>
          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="local-capacidade" class="form-label">Capacidade</label>
              <input type="number" class="form-control" id="local-capacidade" min="0">
            </div>
            <div class="col-md-4 mb-3">
              <label for="local-longitude" class="form-label">Longitude</label>
              <input type="text" class="form-control" id="local-longitude" maxlength="10">
            </div>
            <div class="col-md-4 mb-3">
              <label for="local-latitude" class="form-label">Latitude</label>
              <input type="text" class="form-control" id="local-latitude" maxlength="8">
            </div>
          </div>
          <div>
            <button id="enviar" type="submit" class="btn btn-primary">Salvar</button>
            <button type="button" class="btn btn-secondary" id="btn-cancelar" onclick="window.location.href='gerenciar_local.html'">Cancelar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/valida_sessao.js"></script>
  <script src="../../js/local_adicionar.js"></script>
</body>
</html>
